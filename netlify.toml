# Netlify hosts the FRONTEND only (apps/web). The NestJS API + Postgres live
# elsewhere (see DEPLOYMENT.md). Netlify auto-detects npm workspaces, so with
# base set to apps/web it installs from the repo root.
[build]
  base = "apps/web"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Set in the Netlify UI (Site settings → Environment variables):
#   NEXT_PUBLIC_API_URL = https://<your-api-host>   (no trailing slash)
