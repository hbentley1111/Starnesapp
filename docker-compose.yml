# Local dev services. Postgres uses the pgvector image so the reserved
# embedding columns (Phase 2/3) migrate cleanly, matching managed RDS/Flexible Server.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: starnes
      POSTGRES_PASSWORD: starnes
      POSTGRES_DB: starnes
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  pgdata:
